              - paragraph [ref=e7002]: 我正在为公司的 Android App 搭建一套自动化 UI 测试流水线 (Automated QA Pipeline)。为了确保我们的应用在三星 S24 Ultra、Pixel 8 Pro 和小米 14 等不同厂商品牌上的 UI 渲染和逻辑兼容性，我需要编写一个 PowerShell 脚本。
